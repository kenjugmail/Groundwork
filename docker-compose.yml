services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: groundwork
      POSTGRES_PASSWORD: groundwork
      POSTGRES_DB: groundwork
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U groundwork"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
