<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Groundwork — where unmet need is moving</title>
  <meta name="description" content="An open needs-transparency map: live food-insecurity nowcasts for NYC + Westchester, county baselines for every US state, and world hunger data — every number clickable down to its source." />
  <meta property="og:title" content="Groundwork — where unmet need is moving" />
  <meta property="og:description" content="A live, evidence-linked map of food insecurity and need. Every number clicks down to its source. Open data, open methodology." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2240%22 fill=%22%232c7fb8%22/><circle cx=%2265%22 cy=%2238%22 r=%2214%22 fill=%22%23e31a1c%22/></svg>" />
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    :root {
      --accent: #2c7fb8; --hot: #e31a1c; --ink: #1c2430; --muted: #5d6b7a;
      --card: #f4f6f9; --line: #e3e8ee;
    }
    html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: var(--ink); }
    #map { position: absolute; inset: 0; }
    #panel {
      position: absolute; top: 12px; left: 12px; bottom: 12px; z-index: 2;
      background: rgba(255,255,255,.97); padding: 0 16px 14px; border-radius: 12px;
      width: 400px; box-shadow: 0 6px 24px rgba(16,30,50,.18); font-size: 13px;
      overflow-y: auto; border: 1px solid var(--line);
    }
    #panel::before { content: ""; display: block; height: 4px; margin: 0 -16px 10px;
      background: linear-gradient(90deg, var(--accent), #fd8d3c, var(--hot)); border-radius: 12px 12px 0 0; }
    #panel { scrollbar-width: thin; }
    #panelToggle { display: none; }
    @media (max-width: 640px) {
      #panel { left: 0; right: 0; top: auto; bottom: 0; width: auto;
        max-height: 55vh; border-radius: 12px 12px 0 0; }
      #panel.collapsed { max-height: 88px; overflow: hidden; }
      #panelToggle { display: inline-block; float: right; border: 1px solid #bbb;
        background: #fff; border-radius: 6px; font-size: 11px; padding: 3px 8px; cursor: pointer; }
    }
    #loading { font-size: 11px; color: #888; }
    #about { font-size: 10.5px; color: #777; margin-top: 12px; border-top: 1px solid #eee; padding-top: 8px; }
    #about a { color: #0a58ca; }
    #panel h1 { font-size: 18px; margin: 0 0 2px; letter-spacing: -0.02em; }
    #panel h1::before { content: "●"; color: var(--accent); margin-right: 6px; font-size: 13px; vertical-align: 2px; }
    #panel h2 { font-size: 12px; margin: 14px 0 6px; border-top: 1px solid var(--line); padding-top: 10px;
      text-transform: uppercase; letter-spacing: .06em; color: var(--muted); font-weight: 700; }
    .bar-row .bar { transition: width .25s ease; }
    .controls { display: flex; gap: 6px; margin: 8px 0; align-items: center; flex-wrap: wrap; }
    .controls select { flex: 1; padding: 6px 8px; border-radius: 6px; border: 1px solid #bbb; font-size: 13px; }
    .controls button { padding: 6px 10px; border-radius: 6px; border: 1px solid #bbb; background: #fff;
      cursor: pointer; font-size: 12px; }
    .controls button.on { background: #2c7fb8; color: #fff; border-color: #2c7fb8; }
    .disclaimer { color: #666; font-size: 11px; margin-top: 4px; }
    .statgrid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin: 8px 0; }
    .stat { background: var(--card); border: 1px solid var(--line); border-radius: 10px;
      padding: 9px 6px; text-align: center; transition: transform .12s ease; }
    .stat:hover { transform: translateY(-1px); }
    .stat .v { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }
    .stat .l { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .chart { margin: 8px 0; }
    .chart .t { font-size: 11px; font-weight: 600; color: #444; margin-bottom: 3px; }
    .bar-row { display: flex; align-items: center; gap: 6px; margin: 2px 0; font-size: 11px; }
    .bar-row .lbl { width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      cursor: pointer; color: #0a58ca; }
    .bar-row .lbl.plain { cursor: default; color: #333; }
    .bar-row .bar { height: 12px; border-radius: 3px; background: #e31a1c; min-width: 2px; }
    .bar-row .bar.b2 { background: #2c7fb8; }
    .bar-row .val { color: #555; }
    .sig { border-top: 1px solid #eee; padding: 6px 0; font-size: 12px; }
    .sig .contrib { font-weight: 600; }
    .sig a { color: #0a58ca; font-size: 11px; }
    .guidance { background: #fff8e6; border: 1px solid #f0dca0; border-radius: 8px; padding: 8px 10px;
      font-size: 12px; margin: 8px 0; }
    #actions .act { display: block; margin: 3px 0; padding: 6px 8px; border-radius: 6px;
      text-decoration: none; color: #1a1a1a; background: #f1f3f5; font-size: 12.5px; }
    #actions .act:hover { background: #e2e6ea; }
    #actions .act .org { color: #666; font-size: 11px; }
    #actions .act.get_help { border-left: 3px solid #2c7fb8; }
    #actions .act.donate { border-left: 3px solid #2a9d5c; }
    #actions .act.volunteer { border-left: 3px solid #b86f2c; }
    #actions .act.systemic { border-left: 3px solid #5b3fa8; background: #f4f0fb; }
    #live { display: inline-block; font-size: 10.5px; color: #2a7d4f; margin-left: 6px; }
    #alertsStrip .alert { border-left: 3px solid #e31a1c; background: #fdf0ef; border-radius: 6px;
      padding: 6px 8px; margin: 4px 0; font-size: 12px; cursor: pointer; }
    #alertsStrip .alert.warning { border-left-color: #fd8d3c; background: #fef6ee; }
    #alertsStrip .alert .meta { color: #777; font-size: 10.5px; }
    #live .pulse { display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: #2a9d5c; margin-right: 3px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .3 } }
    #actions .fine { color: #888; font-size: 10.5px; margin-top: 6px; }
    .legend span { display: inline-block; width: 12px; height: 12px; border-radius: 50%;
      vertical-align: middle; margin-right: 3px; }
    .worldtag { display: inline-block; background: #5b3fa8; color: #fff; border-radius: 4px;
      font-size: 10px; padding: 2px 6px; vertical-align: middle; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="panel">
    <h1>Groundwork <span id="live"></span><button id="panelToggle">▾</button></h1>
    <div style="font-size:12px;color:#444">Where unmet need is moving — with the evidence chain.</div>
    <div id="loading"></div>
    <div class="controls">
      <select id="loc"></select>
      <select id="metric" style="display:none" title="Need category (US county view)"></select>
      <button id="viewToggle" title="Switch between tract dots and filled polygons">Choropleth</button>
    </div>
    <div class="legend" id="legend"></div>
    <div class="disclaimer" id="modeNote"></div>
    <div id="alertsStrip"></div>
    <div id="analytics"></div>
    <div id="detail"></div>
    <div id="actions"></div>
    <div id="about">
      Open source (Apache-2.0) · data CC-BY-4.0 ·
      <a href="https://github.com/kenjugmail/Groundwork" target="_blank">code</a> ·
      <a href="https://github.com/kenjugmail/Groundwork/blob/main/METHODOLOGY.md" target="_blank">methodology + weights</a> ·
      <a href="https://github.com/kenjugmail/Groundwork/blob/main/WHAT_THIS_IS_NOT.md" target="_blank">what this is not</a> ·
      <a href="/v1/alerts.atom">alert feed</a> ·
      <a href="https://github.com/kenjugmail/Groundwork/blob/main/coverage/README.md" target="_blank">known blind spots</a>
    </div>
  </div>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="app.js"></script>
</body>
</html>
